# المطور رفع هذا الكود وسيتم تشغيله كما هو
# المتغيرات والوظائف الرئيسية
import pandas as pd
from openpyxl import Workbook
from openpyxl.styles import Font, PatternFill, Alignment, Border, Side
from openpyxl.utils import get_column_letter
import datetime
import sys
import os

NO_OVERTIME_ROLES = ["physical therapist", "physical therapy", "physiotherapist", "pt"]

FIXED_SCHEDULES = [
    (["ahmed ashraf"],                              (datetime.time(13, 0), 8)),
    (["georgina"],                                  (datetime.time(13, 0), 8)),
    (["abeer osman", "abeer"],                      (datetime.time(14, 0), 7)),
    (["ibrahim mohamad", "ibrahim"],                (datetime.time(14, 0), 8)),
    (["mohamed reda", "mohammad reda"],             (datetime.time(14, 0), 8)),
    (["ahmad ibrahim"],                             (datetime.time(14, 0), 8)),
    (["sherouk", "shorouk"],                        (datetime.time(14, 0), 8)),
    (["malak ashour"],                              (datetime.time(14, 0), 8)),
    (["turky mekky", "turky"],                      (datetime.time(14, 0), 8)),
    (["basmala"],                                   (datetime.time(14, 0), 8)),
    (["mahmoud el kashef"],                         (datetime.time(14, 0), 8)),
    (["ahmad mokhtar"],                             (datetime.time(15, 0), 7)),
    (["yasmin sakr"],                               (datetime.time(15, 0), 7)),
    (["mohammad alaa"],                             (datetime.time(15, 0), 7)),
    (["mona magdy"],                                (datetime.time(15, 0), 7)),
    (["nada abdel razik"],                          (datetime.time(11, 0), 8)),
    (["mariam"],                                    (datetime.time(15, 0), 8)),
]

DYNAMIC_SCHEDULES = [
    (["martina"],           [(datetime.time(12, 0), 7), (datetime.time(15, 0), 7)]),
    (["sara hussein", "sarah hussein"],
                            [(datetime.time(12, 0), 7), (datetime.time(15, 0), 7)]),
    (["engy"],              [(datetime.time(11, 0), 8), (datetime.time(15, 0), 8)]),
    (["yasmin mohamad", "yasmin mohammad"],
                            [(datetime.time(14, 0), 8), (datetime.time(15, 0), 7)]),
]

SECRETARY_SHIFTS = [(datetime.time(11, 0), 8), (datetime.time(15, 0), 8)]

def clean_name(raw: str) -> str:
    raw = str(raw)
    for prefix in ["Dr. ", "Dr.", "د.", "الموظف:", "دكتور ", "دكتورة "]:
        raw = raw.replace(prefix, "")
    return raw.strip()

def minutes_from_midnight(t: datetime.time) -> int:
    return t.hour * 60 + t.minute

def closest_shift(checkin_time: datetime.time, options: list) -> tuple:
    ci = minutes_from_midnight(checkin_time)
    best = min(options, key=lambda opt: abs(ci - minutes_from_midnight(opt[0])))
    return best

def get_schedule(raw_name: str, checkin_time: datetime.time, secretary_names: set, no_overtime_names: set):
    n = clean_name(raw_name).lower()
    calc_ot = raw_name not in no_overtime_names
    if raw_name in secretary_names:
        shift = closest_shift(checkin_time, SECRETARY_SHIFTS) if checkin_time else SECRETARY_SHIFTS[0]
        return (shift[0], shift[1], calc_ot)
    for keywords, schedule in FIXED_SCHEDULES:
        if any(kw in n for kw in keywords):
            return (schedule[0], schedule[1], calc_ot)
    for keywords, options in DYNAMIC_SCHEDULES:
        if any(kw in n for kw in keywords):
            shift = closest_shift(checkin_time, options) if checkin_time else options[0]
            return (shift[0], shift[1], calc_ot)
    return (datetime.time(14, 0), 8, calc_ot)

def match_name(raw: str, refs: list) -> str:
    c = clean_name(raw).lower()
    for r in refs:
        if c == r.lower(): return r
    best, best_score = None, 0
    for r in refs:
        rc = r.lower()
        if c in rc or rc in c:
            score = len(min(c, rc, key=len))
            if score > best_score: best_score, best = score, r
    if not best:
        cwords = set(c.split())
        for r in refs:
            rwords = set(r.lower().split())
            overlap = len(cwords & rwords)
            if overlap > best_score: best_score, best = overlap, r
    return best if best else clean_name(raw)

def load_employee_data(emp_path: str):
    try: emp_df = pd.read_excel(emp_path, header=0)
    except Exception: emp_df = pd.read_csv(emp_path, header=0)
    print(f"\n[+] Employee file columns: {emp_df.columns.tolist()}")
    name_col = emp_df.iloc[:, 1]
    ref_names = name_col.dropna().astype(str).str.strip().tolist()
    ref_names = [n for n in ref_names if n and n.lower() not in ("nan", "name", "الاسم", "#")]
    role_col = None
    for col in emp_df.columns:
        col_lower = str(col).lower()
        if any(k in col_lower for k in ["role", "job", "position", "وظيفة", "وظيف", "title", "department"]):
            role_col = col; break
    if role_col is None and emp_df.shape[1] >= 3: role_col = emp_df.columns[2]
    secretary_names, no_overtime_names = set(), set()
    if role_col:
        for _, row in emp_df.iterrows():
            raw_name = str(row.iloc[1]).strip()
            role = str(row.get(role_col, "")).lower().strip()
            if not raw_name or raw_name.lower() in ("nan", ""): continue
            if any(k in role for k in ["secretary", "سكرتير", "سكرتاريه", "سكرتارية", "receptionist", "استقبال"]): secretary_names.add(raw_name)
            if any(k in role for k in NO_OVERTIME_ROLES): no_overtime_names.add(raw_name)
    print(f"[+] Total employees: {len(ref_names)}")
    return ref_names, secretary_names, no_overtime_names

def process_attendance(attn_path: str, ref_names: list, secretary_names: set, no_overtime_names: set) -> pd.DataFrame:
    try: df = pd.read_excel(attn_path)
    except Exception: df = pd.read_csv(attn_path)
    df['Matched_Name'] = df['User'].apply(lambda x: match_name(x, ref_names))
    df['Created_DT'] = pd.to_datetime(df['Created'])
    df['Last_Updated_DT'] = pd.to_datetime(df['Last Updated'])
    df['Date'] = df['Created_DT'].dt.date
    name_order_map = {n: i for i, n in enumerate(ref_names)}
    df['_order'] = df['Matched_Name'].map(name_order_map).fillna(999)
    df = df.sort_values(['_order', 'Date', 'Created_DT']).reset_index(drop=True)
    return df

COLOR_PAIRS = [("D6EAF8", "EBF5FB"), ("D5F5E3", "EAFAF1"), ("FDEBD0", "FEF9E7"), ("EDE0FF", "F9F0FF")]

def build_report(df: pd.DataFrame, secretary_names: set, no_overtime_names: set, output_path: str):
    wb = Workbook(); ws = wb.active
    try: ws.title = f"تقرير {df['Created_DT'].dt.to_period('M').mode()[0]}"
    except: ws.title = "تقرير الحضور"
    ws.sheet_view.rightToLeft = True
    headers = ['الاسم', 'التاريخ', 'الفرع', 'حضور', 'انصراف', 'ساعات فعلية', 'موعد رسمي', 'ساعات مطلوبة', 'تأخير (د)', 'إضافي (د)']
    hdr_fill, hdr_font, thin = PatternFill("solid", fgColor="1F3864"), Font(name='Segoe UI', bold=True, size=11, color="FFFFFF"), Side(style='thin', color='CCCCCC')
    border = Border(left=thin, right=thin, top=thin, bottom=thin)
    for ci, h in enumerate(headers, 1):
        cell = ws.cell(row=1, column=ci, value=h)
        cell.font, cell.fill, cell.alignment, cell.border = hdr_font, hdr_fill, Alignment(horizontal='center', vertical='center'), border
    
    prev_name, color_idx, row_flip = None, -1, 0
    for _, row in df.iterrows():
        matched = row['Matched_Name']
        if matched != prev_name: color_idx = (color_idx + 1) % len(COLOR_PAIRS); prev_name = matched; row_flip = 0
        fill_color = COLOR_PAIRS[color_idx][row_flip % 2]; row_flip += 1; row_fill = PatternFill("solid", fgColor=fill_color)
        checkin_dt, checkout_dt = row['Created_DT'], row['Last_Updated_DT']
        checkin_t = checkin_dt.time() if pd.notna(checkin_dt) else None
        official_t, req_h, calc_ot = get_schedule(str(row['User']), checkin_t, secretary_names, no_overtime_names)
        if official_t == datetime.time(14, 0) and req_h == 8:
            official_t, req_h, calc_ot = get_schedule(matched, checkin_t, secretary_names, no_overtime_names)
        
        rn = ws.max_row + 1
        row_vals = [matched, checkin_dt.date() if pd.notna(checkin_dt) else None, str(row['Branch']), checkin_dt.to_pydatetime() if pd.notna(checkin_dt) else None, checkout_dt.to_pydatetime() if pd.notna(checkout_dt) else None, None, datetime.datetime.combine(checkin_dt.date(), official_t) if pd.notna(checkin_dt) else None, req_h, None, None]
        for ci, val in enumerate(row_vals, 1):
            cell = ws.cell(row=rn, column=ci, value=val)
            cell.font, cell.fill, cell.border = Font(name='Segoe UI', size=10), row_fill, border
            cell.alignment = Alignment(horizontal='right' if ci==1 else 'center', vertical='center')
            if ci in (4, 5, 7): cell.number_format = 'HH:MM'
            elif ci == 2: cell.number_format = 'DD/MM/YYYY'
        ws.cell(row=rn, column=6, value=f'=(E{rn}-D{rn})*24').number_format = '0.00'
        ws.cell(row=rn, column=9, value=f'=MAX(0,(D{rn}-G{rn})*1440)').number_format = '0'
        ws.cell(row=rn, column=10, value=f'=MAX(0,(F{rn}-H{rn})*60)' if calc_ot else 0).number_format = '0'
        for ci in (6, 9, 10):
            c = ws.cell(row=rn, column=ci); c.fill, c.border, c.alignment = row_fill, border, Alignment(horizontal='center', vertical='center')
    for i, w in enumerate([22, 14, 16, 12, 12, 14, 14, 16, 13, 13], 1): ws.column_dimensions[get_column_letter(i)].width = w
    ws.freeze_panes = 'A2'; ws.auto_filter.ref = f"A1:J{ws.max_row}"
    wb.save(output_path)
    print(f"✅ Report saved → {output_path}")

def main():
    ref_names, sec_names, no_ot = load_employee_data("employees.xlsx")
    df = process_attendance("attendance.xlsx", ref_names, sec_names, no_ot)
    try: period = df['Created_DT'].dt.to_period('M').mode()[0]; out_name = f"BodyFix_Attendance_{period}.xlsx"
    except: out_name = "BodyFix_Attendance_Report.xlsx"
    build_report(df, sec_names, no_ot, out_name)

    <script type="text/plain" id="code-compare-absences">
import os, sys, pandas as pd
from openpyxl import Workbook
from openpyxl.styles import Alignment, Border, Font, PatternFill, Side
from openpyxl.utils import get_column_letter

from bodyfix_attendance_report import (
    match_name, load_employee_data, process_attendance,
    build_locked_schedules, expected_days, GROUP_A_DAYS, GROUP_B_DAYS, FRIDAY,
    SCHED_FULLTIME, STATUS_MATCH, STATUS_YOURS, STATUS_RPT, STATUS_META, F_HDR, H_FILL, H_ALIGN, F_DATA, RIGHT, CENTER
)

WEEKDAY_AR = {0:"الاثنين",1:"الثلاثاء",2:"الأربعاء",3:"الخميس", 4:"الجمعة", 5:"السبت", 6:"الأحد"}

def load_ut_days(emp_path: str, ref_names: list) -> dict:
    try: edf = pd.read_excel(emp_path, header=2)
    except Exception: edf = pd.read_csv(emp_path, header=0)
    ut_col = None
    for col in edf.columns:
        if "ut" in str(col).lower() or "غياب" in str(col): ut_col = col; break
    if ut_col is None: print("⚠️ 'UT أيام' column not found — treating all as 0"); return {n: 0.0 for n in ref_names}
    print(f"[+] UT column found: '{ut_col}'")
    result = {}
    for _, row in edf.iterrows():
        raw = str(row.iloc[1]).strip()
        if not raw or raw.lower() in ("nan",""): continue
        canon = match_name(raw, ref_names)
        try: result[canon] = float(row[ut_col])
        except: result[canon] = 0.0
    return result

def build_system_absences(df: pd.DataFrame, sec_names: set, no_ot: set) -> dict:
    all_workdays = sorted(d for d in df['Created_DT'].dt.date.unique() if d.weekday() != FRIDAY)
    _, stypes = build_locked_schedules(df, sec_names, no_ot)
    result = {}
    for matched, grp in df.groupby('Matched_Name', sort=False):
        stype = stypes.get(matched, SCHED_FULLTIME)
        exp = expected_days(stype, all_workdays)
        
        # إضافة عمود التحقق من البصمات الخاطئة كـ Fallback لتجنب الانهيار
        if '_invalid' not in grp.columns: grp['_invalid'] = False
            
        valid_g = grp[~grp['_invalid']]
        invalid_g = grp[grp['_invalid']]
        present = set(valid_g['Date'].unique())
        invalid = set(invalid_g['Date'].unique()) - present
        ot_days = set()
        for _, row in valid_g.iterrows():
            wd = row['Created_DT'].weekday()
            if stype == "SCHED_PART_A" and wd in GROUP_B_DAYS: ot_days.add(row['Date'])
            elif stype == "SCHED_PART_B" and wd in GROUP_A_DAYS: ot_days.add(row['Date'])
        result[matched] = {'absent': exp - present, 'present': present, 'invalid': invalid, 'ot_days': ot_days, 'sched': stype}
    return result

def compare_logic(ut_days: dict, sys_data: dict, ref_names: list) -> list:
    rows = []
    for name in ref_names:
        your = ut_days.get(name, 0.0)
        sys_n = len(sys_data.get(name, {}).get('absent', set()))
        diff = your - sys_n
        if diff == 0: status = STATUS_MATCH; note = ""
        elif diff > 0: status = STATUS_YOURS; note = f"سجّلت {your:.0f} — التقرير اكتشف {sys_n}"
        else: status = STATUS_RPT; note = f"التقرير اكتشف {sys_n} — سجّلت {your:.0f}"
        info = sys_data.get(name, {})
        rows.append({'name': name, 'your_count': your, 'rpt_count': sys_n, 'diff': diff, 'status': status, 'note': note, 'absent_dates': sorted(info.get('absent', set())), 'sched': info.get('sched', SCHED_FULLTIME)})
    return rows

def write_comparison(rows: list, output_path: str) -> None:
    wb = Workbook(); hdrs = ["الموظف","UT ملفك (أيام)","غيابات التقرير","الفرق","الحالة","ملاحظة"]
    ws1 = wb.active; ws1.title = "مقارنة الغيابات"
    ws1.sheet_view.rightToLeft = True
    for ci, h in enumerate(hdrs, 1):
        c = ws1.cell(row=1, column=ci, value=h)
        c.font, c.fill, c.alignment = F_HDR, H_FILL, H_ALIGN
    for row in rows:
        rn = ws1.max_row + 1
        bg, fnt = STATUS_META.get(row['status'], (None, F_DATA))
        rf = PatternFill("solid", fgColor=bg) if bg else PatternFill()
        for ci, val in enumerate([row['name'], row['your_count'], row['rpt_count'], row['diff'], row['status'], row['note']], 1):
            c = ws1.cell(row=rn, column=ci, value=val)
            c.font, c.fill, c.alignment = fnt, rf, (RIGHT if ci in (1,5,6) else CENTER)
    for w, ci in zip([28,16,18,10,20,55], range(1,7)): ws1.column_dimensions[get_column_letter(ci)].width = w
    
    # تفاصيل غيابات التقرير
    ws3 = wb.create_sheet("تفاصيل غيابات التقرير")
    ws3.sheet_view.rightToLeft = True
    hdrs3 = ["الموظف","التاريخ","اليوم","نوع الجدول"]
    for ci, h in enumerate(hdrs3, 1):
        c = ws3.cell(row=1, column=ci, value=h)
        c.font, c.fill, c.alignment = F_HDR, H_FILL, H_ALIGN
    af = PatternFill("solid", fgColor="FCE4D6")
    for row in rows:
        for d in row['absent_dates']:
            rn = ws3.max_row + 1
            for ci, val in enumerate([row['name'], d, WEEKDAY_AR.get(d.weekday(),""), row['sched']], 1):
                cell = ws3.cell(row=rn, column=ci, value=val)
                cell.font, cell.fill, cell.alignment = F_DATA, af, (RIGHT if ci==1 else CENTER)
                if ci == 2: cell.number_format = 'DD/MM/YYYY'
    for w, ci in zip([28,14,12,14], range(1,5)): ws3.column_dimensions[get_column_letter(ci)].width = w
    wb.save(output_path)
    print(f"✅ Comparison report saved → {output_path}")

def main():
    ref_names, sec_names, no_ot = load_employee_data("employees.xlsx")
    df = process_attendance("attendance.xlsx", ref_names, sec_names, no_ot)
    sys_data = build_system_absences(df, sec_names, no_ot)
    ut_days = load_ut_days("employees.xlsx", ref_names)
    diff_rows = compare_logic(ut_days, sys_data, ref_names)
    try: period = df['Created_DT'].dt.to_period('M').mode()[0]; out_name = f"BodyFix_AbsenceComparison_{period}.xlsx"
    except: out_name = "BodyFix_AbsenceComparison.xlsx"
    write_comparison(diff_rows, out_name)

if __name__ == "__main__":
    main()
    </script>

    <script>
        let pyodideInstance = None;
        const consoleEl = document.getElementById('console');

        function logToConsole(text) {
            consoleEl.textContent += text + "\n";
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function clearConsole() {
            consoleEl.textContent = "";
        }

        // تحضير بيئة البيثون وتحميل المكتبات المطلوبة عند فتح الصفحة
        async function initPyodide() {
            try {
                logToConsole("[*] جاري تهيئة نظام بايثون الداخلي (Pyodide)... قد يستغرق ذلك بضع ثوانٍ.");
                pyodideInstance = await loadPyodide();
                
                // تحميل مكتبات الباندا والـ openpyxl تلقائياً
                logToConsole("[*] جاري تحميل المكتبات الأساسية (pandas, openpyxl)...");
                await pyodideInstance.loadPackage(['pandas', 'openpyxl']);
                
                // إعداد موجه الطباعة لنقل مخرجات الـ print للبينات المعروضة على الشاشة
                pyodideInstance.setStdout({
                    batched: (text) => { logToConsole(text); }
                });

                document.getElementById('pyodide-status').className = "flex items-center gap-2 bg-emerald-500 text-white px-4 py-2 rounded-full text-sm font-semibold";
                document.getElementById('pyodide-status').innerHTML = "<span>🟢 بايثون جاهز للعمل</span>";
                
                document.getElementById('btn-report').disabled = false;
                document.getElementById('btn-compare').disabled = false;
                logToConsole("[+] تم تحميل النظام بنجاح! قم برفع الملفات واضغط على الأزرار لبدء المعالجة.");
            } catch (err) {
                logToConsole(`❌ خطأ أثناء تحميل النظام: ${err.message}`);
            }
        }

        // قراءة الملف من الجهاز وحفظه جوه نظام الملفات الوهمي للبايثون
        async function saveFileToPyodideFS(elementId, virtualName) {
            const fileInput = document.getElementById(elementId);
            if (fileInput.files.length === 0) {
                throw new Error(`برجاء اختيار الملف المطلوب أولاً.`);
            }
            const file = fileInput.files[0];
            const buffer = await file.arrayBuffer();
            pyodideInstance.FS.writeFile(virtualName, new Uint8Array(buffer));
            logToConsole(`[+] تم رفع ملف ${file.name} بنجاح إلى النظام باسم ${virtualName}`);
        }

        // دالة تفعيل تحميل الملف الناتج للمستخدم
        function setupDownloadLink(fileName) {
            const fileData = pyodideInstance.FS.readFile(fileName);
            const blob = new Blob([fileData.buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            const url = URL.createObjectURL(blob);

            const downloadZone = document.getElementById('download-zone');
            const linksContainer = document.getElementById('download-links');
            
            downloadZone.classList.remove('hidden');
            
            const btn = document.createElement('a');
            btn.href = url;
            btn.download = fileName;
            btn.className = "inline-flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-xs hover:bg-emerald-700 transition";
            btn.innerHTML = `📥 تحميل: ${fileName}`;
            linksContainer.appendChild(btn);
        }

        async function runScript(type) {
            if (!pyodideInstance) return;
            
            try {
                // خطوة 1: حفظ الملفات المرفوعة في الـ Virtual File System
                logToConsole("\n--- بدء معالجة جديدة ---");
                await saveFileToPyodideFS('emp-file', 'employees.xlsx');
                await saveFileToPyodideFS('attn-file', 'attendance.xlsx');
                
                if (type === 'report') {
                    logToConsole("[*] جاري تشغيل كود تقرير الحضور الرئيسي...");
                    
                    let reportCode = document.getElementById('code-attendance-report').textContent;
                    
                    // حقن الـ Stubs المفقودة في نهاية الملف الأول تلقائياً لتجنب مشاكل استدعاء الملف الثاني
                    reportCode += `\n# Stubs added dynamically to fulfill imports in compare script
FRIDAY = 4
GROUP_A_DAYS = [5, 0, 2]
GROUP_B_DAYS = [6, 1, 3]
INVALID_MARKER = "INVALID"
ABSENCE_MARKER = "ABSENT"
OT_DAY_MARKER = "OT"
SCHED_FULLTIME = "دوام كامل"
STATUS_MATCH = "✅ متطابق"
STATUS_YOURS = "🔴 ملفك أكثر"
STATUS_RPT   = "🟡 التقرير أكثر"
STATUS_META = {STATUS_MATCH: ("C6EFCE", Font(name='Segoe UI', size=10, color="276221")), STATUS_YOURS: ("FFC7CE", Font(name='Segoe UI', size=10, color="9C0006")), STATUS_RPT: ("FFEB9C", Font(name='Segoe UI', size=10, color="7D6608"))}
F_HDR = Font(name='Segoe UI', bold=True, size=11, color="FFFFFF")
H_FILL = PatternFill("solid", fgColor="1F3864")
H_ALIGN = Alignment(horizontal='center', vertical='center', wrap_text=True)
F_DATA = Font(name='Segoe UI', size=10)
RIGHT = Alignment(horizontal='right',  vertical='center')
CENTER = Alignment(horizontal='center', vertical='center')
def build_locked_schedules(*args): return {}, {}
def expected_days(*args): return set()
`;
                    pyodideInstance.FS.writeFile('bodyfix_attendance_report.py', reportCode);
                    
                    // تشغيل الملف الأول عبر بايثون
                    pyodideInstance.runPython(`
import sys
import importlib
if 'bodyfix_attendance_report' in sys.modules:
    importlib.reload(sys.modules['bodyfix_attendance_report'])
else:
    import bodyfix_attendance_report
bodyfix_attendance_report.main()
                    `);
                    
                } else if (type === 'compare') {
                    logToConsole("[*] جاري تشغيل كود مقارنة الغيابات والاختلافات...");
                    
                    // كتابة الملف الثاني
                    const compareCode = document.getElementById('code-compare-absences').textContent;
                    pyodideInstance.FS.writeFile('bodyfix_compare_absences.py', compareCode);
                    
                    pyodideInstance.runPython(`
import sys
import importlib
if 'bodyfix_compare_absences' in sys.modules:
    importlib.reload(sys.modules['bodyfix_compare_absences'])
else:
    import bodyfix_compare_absences
bodyfix_compare_absences.main()
                    `);
                }

                // الكشف عن أي ملفات إكسيل تم إنشاؤها لتقديمها للتحميل
                const files = pyodideInstance.runPython(`
import os
[f for f in os.listdir('.') if f.endswith('.xlsx') and f not in ('employees.xlsx', 'attendance.xlsx')]
                `).toJs();

                if (files.length > 0) {
                    files.forEach(f => {
                        setupDownloadLink(f);
                        // مسح الملف من الذاكرة الافتراضية بعد تجهيزه للتحميل حتى لا يظهر مجدداً في العمليات القادمة
                        pyodideInstance.FS.unlink(f);
                    });
                } else {
                    logToConsole("⚠️ تم التنفيذ ولكن لم يتم العثور على ملفات مستخرجة جديدة.");
                }

            } catch (err) {
                logToConsole(`❌ فشل في التنفيذ: ${err.message}`);
                console.error(err);
            }
        }

        // بدء تهيئة الـ البيئة فور تشغيل الصفحة
        window.onload = initPyodide;
    </script>
</body>
