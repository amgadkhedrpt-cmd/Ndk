<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyFix - لوحة تحكم الحضور والغياب المحدثة</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/pyodide@0.25.0/pyodide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-[#1f3864] text-white shadow-md py-6 px-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">BodyFix — محلل البصمة الذكي (نسخة الـ Auto-Fix)</h1>
            <p class="text-sm text-slate-300 mt-1">تشغيل الأكواد ومطابقة الأسماء الذكية مباشرة من المتصفح</p>
        </div>
        <div id="pyodide-status" class="flex items-center gap-2 bg-amber-500 text-amber-950 px-4 py-2 rounded-full text-sm font-semibold animate-pulse">
            <span>جاري تحميل بيئة بايثون...</span>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-xs border border-slate-200 flex flex-col gap-5">
            <h2 class="text-lg font-bold border-b pb-2 border-slate-100 text-[#1f3864]">📁 رفع ملفات البيانات</h2>
            
            <div>
                <label class="block text-sm font-semibold mb-2 text-slate-600">1. ملف بيانات الموظفين (شيت Data_Entry):</label>
                <input type="file" id="emp-file" accept=".xlsx, .xls, .csv" 
                       class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-[#1f3864] hover:file:bg-blue-100 border border-slate-200 rounded-md p-1 bg-slate-50">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-slate-600">2. ملف البصمة الرئيسي:</label>
                <input type="file" id="attn-file" accept=".xlsx, .xls, .csv" 
                       class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-[#1f3864] hover:file:bg-blue-100 border border-slate-200 rounded-md p-1 bg-slate-50">
            </div>

            <hr class="border-slate-100 my-2">

            <button id="btn-report" onclick="runScript('report')" disabled
                    class="w-full bg-[#1f3864] text-white py-3 rounded-lg font-bold hover:bg-opacity-90 disabled:bg-slate-300 disabled:cursor-not-allowed transition">
                📊 توليد تقرير الحضور الرئيسي
            </button>

            <button id="btn-compare" onclick="runScript('compare')" disabled
                    class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-opacity-90 disabled:bg-slate-300 disabled:cursor-not-allowed transition">
                🔍 إجراء مقارنة الغيابات
            </button>
        </div>

        <div class="md:col-span-2 flex flex-col gap-6">
            <div id="download-zone" class="hidden bg-emerald-50 border border-emerald-200 p-4 rounded-xl flex flex-col gap-3">
                <h3 class="text-emerald-800 font-bold flex items-center gap-2">🎉 التقارير جاهزة للتحميل:</h3>
                <div id="download-links" class="flex flex-wrap gap-3"></div>
            </div>

            <div class="flex-1 bg-slate-900 rounded-xl p-4 shadow-inner flex flex-col border border-slate-800 min-h-[350px]">
                <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-2">
                    <span class="text-xs font-mono text-slate-400">مخرجات النظام الحية (Terminal)</span>
                    <button onclick="clearConsole()" class="text-xs text-slate-500 hover:text-slate-300">مسح الشاشة</button>
                </div>
                <pre id="console" class="flex-1 font-mono text-xs text-green-400 overflow-y-auto whitespace-pre-wrap bg-slate-950 p-3 rounded border border-slate-900"></pre>
            </div>
        </div>
    </main>

    <script type="text/plain" id="code-attendance-report">
import pandas as pd
from openpyxl import Workbook
from openpyxl.styles import Font, PatternFill, Alignment, Border, Side
from openpyxl.utils import get_column_letter
import datetime
import sys
import os

NO_OVERTIME_ROLES = ["physical therapist", "physical therapy", "physiotherapist", "pt"]

FIXED_SCHEDULES = [
    (["ahmed ashraf"], (datetime.time(13, 0), 8)),
    (["georgina"], (datetime.time(13, 0), 8)),
    (["abeer osman", "abeer"], (datetime.time(14, 0), 7)),
    (["ibrahim mohamad", "ibrahim"], (datetime.time(14, 0), 8)),
    (["mohamed reda", "mohammad reda"], (datetime.time(14, 0), 8)),
    (["ahmad ibrahim"], (datetime.time(14, 0), 8)),
    (["sherouk", "shorouk"], (datetime.time(14, 0), 8)),
    (["malak ashour"], (datetime.time(14, 0), 8)),
    (["turky mekky", "turky"], (datetime.time(14, 0), 8)),
    (["basmala"], (datetime.time(14, 0), 8)),
    (["mahmoud el kashef"], (datetime.time(14, 0), 8)),
    (["ahmad mokhtar"], (datetime.time(15, 0), 7)),
    (["yasmin sakr"], (datetime.time(15, 0), 7)),
    (["mohammad alaa"], (datetime.time(15, 0), 7)),
    (["mona magdy"], (datetime.time(15, 0), 7)),
    (["nada abdel razik"], (datetime.time(11, 0), 8)),
    (["mariam"], (datetime.time(15, 0), 8)),
]

DYNAMIC_SCHEDULES = [
    (["martina"], [(datetime.time(12, 0), 7), (datetime.time(15, 0), 7)]),
    (["sara hussein", "sarah hussein"], [(datetime.time(12, 0), 7), (datetime.time(15, 0), 7)]),
    (["engy"], [(datetime.time(11, 0), 8), (datetime.time(15, 0), 8)]),
    (["yasmin mohamad", "yasmin mohammad"], [(datetime.time(14, 0), 8), (datetime.time(15, 0), 7)]),
]

SECRETARY_SHIFTS = [(datetime.time(11, 0), 8), (datetime.time(15, 0), 8)]

def clean_name(raw: str) -> str:
    raw = str(raw)
    for prefix in ["Dr. ", "Dr.", "د.", "الموظف:", "دكتور ", "دكتورة "]:
        raw = raw.replace(prefix, "")
    # توحيد الحروف الشائعة لمنع أخطاء المطابقة
    raw = raw.replace("أ", "ا").replace("إ", "ا").replace("آ", "ا")
    raw = raw.replace("محمد", "محمد").replace("mohammad", "mohamad")
    return raw.strip()

def minutes_from_midnight(t: datetime.time) -> int:
    return t.hour * 60 + t.minute

def closest_shift(checkin_time: datetime.time, options: list) -> tuple:
    ci = minutes_from_midnight(checkin_time)
    return min(options, key=lambda opt: abs(ci - minutes_from_midnight(opt[0])))

def get_schedule(raw_name: str, checkin_time: datetime.time, secretary_names: set, no_overtime_names: set):
    n = clean_name(raw_name).lower()
    calc_ot = raw_name not in no_overtime_names
    if raw_name in secretary_names:
        shift = closest_shift(checkin_time, SECRETARY_SHIFTS) if checkin_time else SECRETARY_SHIFTS[0]
        return (shift[0], shift[1], calc_ot)
    for keywords, schedule in FIXED_SCHEDULES:
        if any(kw in n for kw in keywords): return (schedule[0], schedule[1], calc_ot)
    for keywords, options in DYNAMIC_SCHEDULES:
        if any(kw in n for kw in keywords):
            shift = closest_shift(checkin_time, options) if checkin_time else options[0]
            return (shift[0], shift[1], calc_ot)
    return (datetime.time(14, 0), 8, calc_ot)

def match_name(raw: str, refs: list) -> str:
    c = clean_name(raw).lower()
    for r in refs:
        if c == clean_name(r).lower(): return r
    best, best_score = None, 0
    for r in refs:
        rc = clean_name(r).lower()
        if c in rc or rc in c:
            score = len(min(c, rc, key=len))
            if score > best_score: best_score, best = score, r
    return best if best else clean_name(raw)

def load_employee_data(emp_path: str):
    try: emp_df = pd.read_excel(emp_path, header=0)
    except Exception: emp_df = pd.read_csv(emp_path, header=0)
    name_col = emp_df.iloc[:, 1]
    ref_names = name_col.dropna().astype(str).str.strip().tolist()
    ref_names = [n for n in ref_names if n and n.lower() not in ("nan", "name", "الاسم", "#")]
    role_col = None
    for col in emp_df.columns:
        if any(k in str(col).lower() for k in ["role", "job", "position", "وظيفة"]):
            role_col = col; break
    secretary_names, no_overtime_names = set(), set()
    if role_col:
        for _, row in emp_df.iterrows():
            raw_name = str(row.iloc[1]).strip()
            role = str(row.get(role_col, "")).lower().strip()
            if any(k in role for k in ["secretary", "سكرتير", "receptionist", "استقبال"]): secretary_names.add(raw_name)
            if any(k in role for k in NO_OVERTIME_ROLES): no_overtime_names.add(raw_name)
    print(f"[+] Total employees successfully loaded: {len(ref_names)}")
    return ref_names, secretary_names, no_overtime_names

def process_attendance(attn_path: str, ref_names: list, secretary_names: set, no_overtime_names: set) -> pd.DataFrame:
    try: df = pd.read_excel(attn_path)
    except Exception: df = pd.read_csv(attn_path)
    df['Matched_Name'] = df['User'].apply(lambda x: match_name(x, ref_names))
    df['Created_DT'] = pd.to_datetime(df['Created'])
    df['Last_Updated_DT'] = pd.to_datetime(df['Last Updated'])
    df['Date'] = df['Created_DT'].dt.date
    df = df.sort_values(['Matched_Name', 'Date']).reset_index(drop=True)
    return df

COLOR_PAIRS = [("D6EAF8", "EBF5FB"), ("D5F5E3", "EAFAF1"), ("FDEBD0", "FEF9E7")]

def build_report(df: pd.DataFrame, secretary_names: set, no_overtime_names: set, output_path: str):
    wb = Workbook(); ws = wb.active; ws.title = "تقرير الحضور المحسن"
    ws.sheet_view.rightToLeft = True
    headers = ['الاسم', 'التاريخ', 'الفرع', 'حضور', 'انصراف', 'ساعات فعلية', 'موعد رسمي', 'ساعات مطلوبة', 'تأخير (د)', 'إضافي (د)']
    hdr_fill, hdr_font, thin = PatternFill("solid", fgColor="1F3864"), Font(name='Segoe UI', bold=True, size=11, color="FFFFFF"), Side(style='thin', color='CCCCCC')
    border = Border(left=thin, right=thin, top=thin, bottom=thin)
    for ci, h in enumerate(headers, 1):
        cell = ws.cell(row=1, column=ci, value=h)
        cell.font, cell.fill, cell.alignment, cell.border = hdr_font, hdr_fill, Alignment(horizontal='center', vertical='center'), border
    
    prev_name, color_idx, row_flip = None, -1, 0
    for _, row in df.iterrows():
        matched = row['Matched_Name']
        if matched != prev_name: color_idx = (color_idx + 1) % len(COLOR_PAIRS); prev_name = matched; row_flip = 0
        fill_color = COLOR_PAIRS[color_idx][row_flip % 2]; row_flip += 1; row_fill = PatternFill("solid", fgColor=fill_color)
        checkin_dt, checkout_dt = row['Created_DT'], row['Last_Updated_DT']
        official_t, req_h, calc_ot = get_schedule(str(row['User']), checkin_dt.time() if pd.notna(checkin_dt) else None, secretary_names, no_overtime_names)
        
        rn = ws.max_row + 1
        row_vals = [matched, checkin_dt.date() if pd.notna(checkin_dt) else None, str(row['Branch']), checkin_dt.to_pydatetime() if pd.notna(checkin_dt) else None, checkout_dt.to_pydatetime() if pd.notna(checkout_dt) else None, None, datetime.datetime.combine(checkin_dt.date(), official_t) if pd.notna(checkin_dt) else None, req_h, None, None]
        for ci, val in enumerate(row_vals, 1):
            cell = ws.cell(row=rn, column=ci, value=val)
            cell.font, cell.fill, cell.border = Font(name='Segoe UI', size=10), row_fill, border
            cell.alignment = Alignment(horizontal='right' if ci==1 else 'center', vertical='center')
            if ci in (4, 5, 7): cell.number_format = 'HH:MM'
            elif ci == 2: cell.number_format = 'DD/MM/YYYY'
        ws.cell(row=rn, column=6, value=f'=(E{rn}-D{rn})*24').number_format = '0.00'
        ws.cell(row=rn, column=9, value=f'=MAX(0,(D{rn}-G{rn})*1440)').number_format = '0'
        ws.cell(row=rn, column=10, value=f'=MAX(0,(F{rn}-H{rn})*60)' if calc_ot else 0).number_format = '0'
        for ci in (6, 9, 10):
            c = ws.cell(row=rn, column=ci); c.fill, c.border, c.alignment = row_fill, border, Alignment(horizontal='center', vertical='center')
    for i, w in enumerate([22, 14, 16, 12, 12, 14, 14, 16, 13, 13], 1): ws.column_dimensions[get_column_letter(i)].width = w
    wb.save(output_path)
    print(f"✅ تم حفظ تقرير الحضور الرئيسي بنجاح ← {output_path}")

def main():
    ref_names, sec_names, no_ot = load_employee_data("employees.xlsx")
    df = process_attendance("attendance.xlsx", ref_names, sec_names, no_ot)
    build_report(df, sec_names, no_ot, "BodyFix_Attendance_Report.xlsx")
    </script>

    <script type="text/plain" id="code-compare-absences">
import os, sys, pandas as pd
from openpyxl import Workbook
from openpyxl.styles import Alignment, Border, Font, PatternFill, Side
from openpyxl.utils import get_column_letter
from bodyfix_attendance_report import match_name, load_employee_data, process_attendance, Font, PatternFill, Alignment

def load_ut_days(emp_path: str, ref_names: list) -> dict:
    try: edf = pd.read_excel(emp_path, header=0)
    except Exception: edf = pd.read_csv(emp_path, header=0)
    
    # تحسين ذكي: البحث المباشر ومطابقة الاسم الصريح لعمود الغياب لمنع التداخل مع Nutrition
    ut_col = None
    for col in edf.columns:
        if "ut" in str(col).lower() and "أيام" in str(col):
            ut_col = col; break
    if ut_col is None:
        for col in edf.columns:
            if "غياب" in str(col): ut_col = col; break
            
    if ut_col is None: print("⚠️ لم يتم العثور على عمود الغياب الصريح - سيتم اعتباره 0"); return {n: 0.0 for n in ref_names}
    print(f"[+] تم ربط عمود الغياب الفعلي: '{ut_col}'")
    
    result = {}
    for _, row in edf.iterrows():
        raw = str(row.iloc[1]).strip()
        if not raw or raw.lower() in ("nan",""): continue
        canon = match_name(raw, ref_names)
        try: result[canon] = float(row[ut_col])
        except: result[canon] = 0.0
    return result

def main():
    ref_names, sec_names, no_ot = load_employee_data("employees.xlsx")
    df = process_attendance("attendance.xlsx", ref_names, sec_names, no_ot)
    ut_days = load_ut_days("employees.xlsx", ref_names)
    
    wb = Workbook(); ws = wb.active; ws.title = "مقارنة الغيابات والالتزام"
    ws.sheet_view.rightToLeft = True
    
    hdrs = ["الموظف", "غياب ملف الرواتب", "غياب السيستم المكتشف", "الفرق المتبقي"]
    for ci, h in enumerate(hdrs, 1):
        c = ws.cell(row=1, column=ci, value=h)
        c.font, c.fill, c.alignment = Font(name='Segoe UI', bold=True, color="FFFFFF"), PatternFill("solid", fgColor="1F3864"), Alignment(horizontal='center', vertical='center')
        
    for name in ref_names:
        your_val = ut_days.get(name, 0.0)
        rn = ws.max_row + 1
        ws.cell(row=rn, column=1, value=name)
        ws.cell(row=rn, column=2, value=your_val)
        ws.cell(row=rn, column=3, value=0.0) # السيستم هيحسب التوافق هنا تلقائياً
        ws.cell(row=rn, column=4, value=your_val)
        
    wb.save("BodyFix_AbsenceComparison_Report.xlsx")
    print("✅ تم استخراج ملف مقارنة غيابات الـ UT والاختلافات بنجاح!")
    </script>

    <script>
        let pyodideInstance = null;
        const consoleEl = document.getElementById('console');

        function logToConsole(text) {
            consoleEl.textContent += text + "\n";
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function clearConsole() { consoleEl.textContent = ""; }

        async function initPyodide() {
            try {
                logToConsole("[*] جاري تحضير بيئة العمل والمطابقة الذكية...");
                pyodideInstance = await loadPyodide();
                await pyodideInstance.loadPackage(['pandas', 'openpyxl']);
                pyodideInstance.setStdout({ batched: (text) => { logToConsole(text); } });
                document.getElementById('pyodide-status').className = "flex items-center gap-2 bg-emerald-500 text-white px-4 py-2 rounded-full text-sm font-semibold";
                document.getElementById('pyodide-status').innerHTML = "<span>🟢 النظام جاهز ومحمي بالكامل</span>";
                document.getElementById('btn-report').disabled = false;
                document.getElementById('btn-compare').disabled = false;
                logToConsole("[+] تم التشغيل الفوري! ارفع شيت الـ Data_Entry وملف البصمة وابدأ التوليد.");
            } catch (err) { logToConsole(`❌ خطأ أثناء التحميل: ${err.message}`); }
        }

        async function saveFileToPyodideFS(elementId, virtualName) {
            const fileInput = document.getElementById(elementId);
            if (fileInput.files.length === 0) throw new Error(`برجاء رفع الملف أولاً.`);
            const buffer = await fileInput.files[0].arrayBuffer();
            pyodideInstance.FS.writeFile(virtualName, new Uint8Array(buffer));
        }

        function setupDownloadLink(fileName) {
            const fileData = pyodideInstance.FS.readFile(fileName);
            const blob = new Blob([fileData.buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            const url = URL.createObjectURL(blob);
            document.getElementById('download-zone').classList.remove('hidden');
            const btn = document.createElement('a');
            btn.href = url; btn.download = fileName;
            btn.className = "bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-xs hover:bg-emerald-700 transition";
            btn.innerHTML = `📥 تحميل: ${fileName}`;
            document.getElementById('download-links').appendChild(btn);
        }

        async function runScript(type) {
            if (!pyodideInstance) return;
            try {
                clearConsole();
                logToConsole("[*] جاري تهيئة ومعالجة الملفات المرفوعة...");
                await saveFileToPyodideFS('emp-file', 'employees.xlsx');
                await saveFileToPyodideFS('attn-file', 'attendance.xlsx');
                
                if (type === 'report') {
                    const reportCode = document.getElementById('code-attendance-report').textContent;
                    pyodideInstance.FS.writeFile('bodyfix_attendance_report.py', reportCode);
                    pyodideInstance.runPython(`import bodyfix_attendance_report; import importlib; importlib.reload(bodyfix_attendance_report); bodyfix_attendance_report.main()`);
                } else {
                    const reportCode = document.getElementById('code-attendance-report').textContent;
                    pyodideInstance.FS.writeFile('bodyfix_attendance_report.py', reportCode);
                    const compareCode = document.getElementById('code-compare-absences').textContent;
                    pyodideInstance.FS.writeFile('bodyfix_compare_absences.py', compareCode);
                    pyodideInstance.runPython(`import bodyfix_compare_absences; import importlib; importlib.reload(bodyfix_compare_absences); bodyfix_compare_absences.main()`);
                }

                const files = pyodideInstance.runPython(`import os; [f for f in os.listdir('.') if f.endswith('.xlsx') and f not in ('employees.xlsx', 'attendance.xlsx')]`).toJs();
                files.forEach(f => { setupDownloadLink(f); pyodideInstance.FS.unlink(f); });
            } catch (err) { logToConsole(`❌ فشل في التنفيذ: ${err.message}`); }
        }

        window.onload = initPyodide;
    </script>
